<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desktop Layout</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: white;
    }

    .page {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      max-width: 1218px;
      margin: 0 auto;
    }

    /* Full-width blocks */
    .block-navbar {
      background-color: black;
      height: 99px;
      width: 100%;
    }

    .block-hero {
      background-color: black;
      height: 277px;
      width: 100%;
    }

    .block-footer {
      background-color: black;
      height: 277px;
      width: 100%;
    }

    /* 3-column grid rows */
    .grid-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 24px;
    }

    .block-card {
      background-color: black;
      height: 277px;
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- Navbar -->
    <div class="block-navbar"></div>

    <!-- Hero / Full-width banner -->
    <div class="block-hero"></div>

    <!-- Row 1: 3 cards -->
    <div class="grid-row">
      <div class="block-card"></div>
      <div class="block-card"></div>
      <div class="block-card"></div>
    </div>

    <!-- Row 2: 3 cards -->
    <div class="grid-row">
      <div class="block-card"></div>
      <div class="block-card"></div>
      <div class="block-card"></div>
    </div>

    <!-- Footer / Full-width banner -->
    <div class="block-footer"></div>

  </div>
</body>
</html>
